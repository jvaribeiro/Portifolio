<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="150" height="45">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;display=swap');
      .logo-text {
        font-family: 'Fira Code', monospace;
        font-size: 38px;
        font-weight: 700;
      }
      .tag { fill: #3b82f6; } /* Azul Vibrante */
      .name { fill: #0f172a; } /* Azul Corporativo Escuro */
    </style>
  </defs>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="logo-text">
    <tspan class="tag">&lt;</tspan><tspan class="name">JVAR</tspan><tspan class="tag">/&gt;</tspan>
  </text>
</svg>
